<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon de Zuppa イベント管理</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231E3A5F'/%3E%3Cg transform='rotate(-45 16 16)'%3E%3Cpath d='M16 6 L19 13 L16 15 L13 13 Z' fill='%23ffffff'/%3E%3Crect x='14.5' y='15' width='3' height='8' rx='0.5' fill='%23c8d8f0'/%3E%3Cpath d='M15 23 L16 27 L17 23 Z' fill='%23ffffff'/%3E%3C/g%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
  :root{
    --bg:#FAFBFC; --surface:#FFFFFF; --border:#E5E7EB; --border-input:#D1D5DB;
    --ink:#0F172A; --ink-soft:#6B7280; --ink-muted:#9CA3AF;
    --navy:#1E3A5F; --navy-hover:#284B74; --navy-active:#16304E;
    --navy-ring:rgba(30,58,95,0.12); --link:#2563EB; --line:#E5E7EB;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:20px;background:var(--bg);font-family:'Zen Kaku Gothic New','Inter',sans-serif;}
  .zuppa-app{color:var(--ink);background:var(--surface);border-radius:16px;padding:0;max-width:960px;margin:0 auto;overflow:hidden;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.03);}
  .zuppa-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
  .zuppa-eyebrow{font-size:11px;letter-spacing:0.12em;color:var(--navy);font-weight:600;text-transform:uppercase;margin-bottom:8px;}
  .zuppa-title{font-family:'Inter','Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:22px;margin:0 0 6px;color:var(--ink);letter-spacing:-0.01em;}
  .zuppa-sub{font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .zuppa-body{padding:24px 32px 36px;display:grid;grid-template-columns:1fr;gap:24px;background:var(--bg);}
  @media(min-width:760px){.zuppa-body{grid-template-columns:300px 1fr;}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 18px 20px;box-shadow:0 1px 2px rgba(0,0,0,0.04);}
  .panel-title{font-weight:600;font-size:13.5px;margin:0 0 4px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;}
  .panel-title button{font-size:11px;color:var(--link);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:0;}
  .panel-sub{font-size:12px;color:var(--ink-soft);margin:0 0 14px;line-height:1.5;}
  .panel + .panel{margin-top:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;font-weight:500;color:var(--ink-soft);margin-bottom:4px;}
  input[type=text],input[type=password],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border-input);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-ring);}
  textarea{resize:vertical;min-height:72px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:background .15s,transform .08s,box-shadow .15s;line-height:1;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-hover);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-ghost{background:none;color:var(--ink);border:1px solid var(--border);font-size:12px;padding:6px 12px;border-radius:8px;}
  .btn-ghost:hover{background:var(--bg);border-color:var(--navy);}
  .btn-small{font-size:12px;padding:7px 14px;}
  .status-line{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}
  .status-line.error{color:#DC2626;}
  .time-row{display:flex;gap:8px;align-items:center;}
  .time-row select{flex:1;}
  .time-sep{font-size:13px;color:var(--ink-muted);}
  /* Google連携ステータス */
  .cal-status-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
  .cal-dot{width:8px;height:8px;border-radius:50%;background:#D1D5DB;flex-shrink:0;transition:background .3s;}
  .cal-dot.connected{background:#16A34A;}
  /* コラム */
  .left-col{display:flex;flex-direction:column;gap:16px;}
  .right-col{display:flex;flex-direction:column;gap:16px;}
  /* トースト */
  #zuppa-toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.18);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;}
  #zuppa-toast.show{opacity:1;transform:translateY(0);}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="zuppa-app">
  <div class="zuppa-header">
    <div class="zuppa-eyebrow">SALON DE ZUPPA / 管理ツール</div>
    <h1 class="zuppa-title">イベント管理</h1>
    <p class="zuppa-sub">Googleカレンダーへのイベント登録と、WebサイトのイベントページをSheetsから更新します。</p>
  </div>

  <div class="zuppa-body">
    <!-- 左カラム -->
    <div class="left-col">

      <!-- Googleカレンダー連携 -->
      <div class="panel">
        <div class="panel-title">
          📅 Googleカレンダー連携
          <button id="calToggle">設定</button>
        </div>
        <p class="panel-sub">イベントをGoogleカレンダーに直接登録できます。最初に一度だけ設定してください。</p>
        <div class="cal-status-bar">
          <span class="cal-dot" id="calDot"></span>
          <span id="calStatusText">読み込み中…</span>
        </div>
        <div id="calEditView" style="display:none;">
          <div class="field">
            <label for="cal-client-id">Google OAuthクライアントID</label>
            <input id="cal-client-id" type="text" placeholder="XXXXXXXX.apps.googleusercontent.com">
          </div>
          <div class="field">
            <label for="cal-calendar-id">カレンダーID</label>
            <input id="cal-calendar-id" type="text" placeholder="例：xxxx@group.calendar.google.com">
          </div>
          <button class="btn btn-primary btn-small" id="calSettingsSave">設定を保存</button>
        </div>
        <button class="btn btn-ghost btn-small" id="calConnectBtn" type="button" style="margin-top:8px;">Googleと連携する</button>
      </div>

      <!-- Webサイト連携 -->
      <div class="panel">
        <div class="panel-title">
          🌐 Webサイト連携
          <button id="pubToggle">設定</button>
        </div>
        <p class="panel-sub">Google SheetsのイベントデータをNetlifyサイトに反映します。</p>
        <div id="pubStatusText" style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;"></div>
        <div id="pubEditView" style="display:none;">
          <div class="field">
            <label for="pub-sheets-id">GoogleスプレッドシートID</label>
            <input id="pub-sheets-id" type="text" placeholder="1BxiM...（URLの /d/ と /edit の間）">
          </div>
          <div class="field">
            <label for="pub-netlify-token">Netlify Personal Access Token</label>
            <input id="pub-netlify-token" type="password" placeholder="nfp_...">
          </div>
          <div class="field">
            <label for="pub-netlify-site">Netlify サイトID</label>
            <input id="pub-netlify-site" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
          </div>
          <button class="btn btn-primary btn-small" id="pubSettingsSave">設定を保存</button>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-ghost btn-small" id="pubExportBtn">📋 設定をコピー</button>
            <button class="btn btn-ghost btn-small" id="pubImportBtn">📥 設定を貼り付け</button>
          </div>
          <div id="pubImportArea" style="display:none;margin-top:8px;">
            <textarea id="pubImportJson" placeholder='{"calSettings":{"clientId":"..."},"pubSettings":{...}}' style="font-size:11px;height:80px;"></textarea>
            <button class="btn btn-ghost btn-small" id="pubImportConfirm" style="margin-top:4px;">適用</button>
          </div>
        </div>

        <!-- イベント履歴（Sheetsから） -->
        <div id="pubHistorySection" style="display:none;margin-top:12px;">
          <div style="font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;">公開履歴（Sheetsから取得）</div>
          <div id="pubHistoryList" style="font-size:12px;line-height:1.7;max-height:200px;overflow-y:auto;"></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
            <button class="btn btn-ghost btn-small" id="pubHistoryRefresh">↻ 更新</button>
            <button class="btn btn-ghost btn-small" id="listingPreviewBtn">📋 一覧プレビュー</button>
            <button class="btn btn-ghost btn-small" id="redeployListingBtn">🔄 一覧を再デプロイ</button>
          </div>
          <div class="status-line" id="recoverStatus" style="margin-top:6px;"></div>
        </div>
      </div>

    </div><!-- /left-col -->

    <!-- 右カラム -->
    <div class="right-col">

      <!-- イベント登録フォーム -->
      <div class="panel">
        <div class="panel-title">🗓️ イベント登録</div>
        <p class="panel-sub">イベント名・日時を入力してGoogleカレンダーに登録します。</p>
        <div class="field">
          <label for="eventTitle">イベント名</label>
          <input id="eventTitle" type="text" placeholder="例：ワークショップ">
        </div>
        <div class="field">
          <label>開催日</label>
          <input id="eventDate" type="date">
        </div>
        <div class="field">
          <label>時間</label>
          <div class="time-row">
            <select id="eventTimeStart"></select>
            <span class="time-sep">〜</span>
            <select id="eventTimeEnd"></select>
          </div>
          <input id="eventTime" type="hidden">
        </div>
        <div class="field">
          <label for="eventDesc">イベント概要</label>
          <textarea id="eventDesc" placeholder="例：参加費・持ち物・場所の詳細など" style="min-height:80px;"></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
          <button class="btn btn-primary" id="calAddEventBtn">📅 Googleカレンダーに登録</button>
          <button class="btn btn-ghost btn-small" id="eventClear">日時をクリア</button>
        </div>
        <div class="status-line" id="calAddStatus"></div>
      </div>

    </div><!-- /right-col -->
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════════════════
const storage = {
  get: async (key) => {
    try{ return { value: localStorage.getItem(key) }; }catch(e){ return null; }
  },
  set: async (key, value) => {
    try{ localStorage.setItem(key, value); }catch(e){}
  }
};

// ═══════════════════════════════════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════════════════════════════════
const els = {
  calToggle:       document.getElementById('calToggle'),
  calEditView:     document.getElementById('calEditView'),
  calClientId:     document.getElementById('cal-client-id'),
  calCalendarId:   document.getElementById('cal-calendar-id'),
  calSettingsSave: document.getElementById('calSettingsSave'),
  calConnectBtn:   document.getElementById('calConnectBtn'),
  calDot:          document.getElementById('calDot'),
  calStatusText:   document.getElementById('calStatusText'),
  eventTitle:      document.getElementById('eventTitle'),
  eventDate:       document.getElementById('eventDate'),
  eventTime:       document.getElementById('eventTime'),
  calAddEventBtn:  document.getElementById('calAddEventBtn'),
  calAddStatus:    document.getElementById('calAddStatus'),
  eventDesc:       document.getElementById('eventDesc'),
  eventClear:      document.getElementById('eventClear'),
  pubToggle:       document.getElementById('pubToggle'),
  pubEditView:     document.getElementById('pubEditView'),
  pubSheetsId:     document.getElementById('pub-sheets-id'),
  pubNetlifyToken: document.getElementById('pub-netlify-token'),
  pubNetlifySite:  document.getElementById('pub-netlify-site'),
  pubSettingsSave: document.getElementById('pubSettingsSave'),
  pubStatusText:   document.getElementById('pubStatusText'),
};

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let calSettings    = { clientId:'', calendarId:'627cgebu90hqut878j7rkr9cq4@group.calendar.google.com' };
let publishSettings = { sheetsId:'', netlifyToken:'', netlifySiteId:'' };
let tokenClient = null;
let accessToken = null;

function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════════════
function showToast(msg, color){
  let t = document.getElementById('zuppa-toast');
  if(!t){ t = document.createElement('div'); t.id='zuppa-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = color || '#16A34A';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════════════════
// GOOGLE CALENDAR OAUTH
// ═══════════════════════════════════════════════════════════════════════════
function setCalStatus(connected, text){
  els.calDot.classList.toggle('connected', !!connected);
  els.calStatusText.textContent = text;
  if(connected) showToast('✅ Googleカレンダーとの連携が成功しました');
}

function setupTokenClient(){
  if(!window.google || !google.accounts || !google.accounts.oauth2){
    setCalStatus(false, 'Google連携の準備中…（クライアントIDを設定してください）');
    return;
  }
  if(!calSettings.clientId){
    setCalStatus(false, '未連携（クライアントIDを設定してください）');
    return;
  }
  try{
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: calSettings.clientId,
      scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/spreadsheets',
      callback: (resp)=>{
        if(resp && resp.access_token){
          accessToken = resp.access_token;
          window._zuppaToken = resp.access_token;
          setCalStatus(true, '連携済み（このブラウザのセッション中のみ有効）');
          loadPubHistory();
        }else{
          setCalStatus(false, '連携に失敗しました。もう一度お試しください。');
        }
      },
    });
    setCalStatus(!!accessToken, accessToken ? '連携済み' : '未連携（「Googleと連携する」を押してください）');
  }catch(e){
    setCalStatus(false, '連携の準備に失敗しました。クライアントIDを確認してください。');
  }
}

async function loadCalSettings(){
  try{
    const r = await storage.get('zuppa:calSettings');
    if(r && r.value){ calSettings = { ...calSettings, ...JSON.parse(r.value) }; }
  }catch(e){}
  els.calCalendarId.value = calSettings.calendarId || '';
  els.calClientId.value   = calSettings.clientId   || '';
  setupTokenClient();
}

els.calToggle.addEventListener('click', ()=>{
  const showing = els.calEditView.style.display !== 'none';
  els.calEditView.style.display = showing ? 'none' : 'block';
});

els.calSettingsSave.addEventListener('click', async ()=>{
  calSettings = {
    clientId:   els.calClientId.value.trim(),
    calendarId: els.calCalendarId.value.trim() || calSettings.calendarId,
  };
  try{ await storage.set('zuppa:calSettings', JSON.stringify(calSettings)); }catch(e){}
  setupTokenClient();
  els.calEditView.style.display = 'none';
  setCalStatus(false, '設定を保存しました。「Googleと連携する」を押して接続してください。');
});

els.calConnectBtn.addEventListener('click', ()=>{
  const clientId = calSettings.clientId || els.calClientId.value.trim();
  if(!clientId){
    els.calEditView.style.display = 'block';
    setCalStatus(false, 'まずクライアントIDを設定してください。');
    return;
  }
  if(!calSettings.clientId){ calSettings.clientId = clientId; }
  if(!tokenClient){ setupTokenClient(); }
  if(tokenClient){ tokenClient.requestAccessToken({ prompt:'' }); }
});

// ═══════════════════════════════════════════════════════════════════════════
// 時間プルダウン
// ═══════════════════════════════════════════════════════════════════════════
function buildTimeOptions(){
  let html = '<option value="">-- 時間 --</option>';
  for(let h = 7; h <= 23; h++){
    for(let m of [0, 30]){
      if(h === 23 && m === 30) continue;
      const val = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      html += `<option value="${val}">${val}</option>`;
    }
  }
  return html;
}
const timeOptionsHtml = buildTimeOptions();
document.getElementById('eventTimeStart').innerHTML = timeOptionsHtml;
document.getElementById('eventTimeEnd').innerHTML   = timeOptionsHtml;

function syncEventTime(){
  const s = document.getElementById('eventTimeStart').value;
  const e = document.getElementById('eventTimeEnd').value;
  els.eventTime.value = (s && e) ? `${s}〜${e}` : (s || e || '');
}
document.getElementById('eventTimeStart').addEventListener('change', syncEventTime);
document.getElementById('eventTimeEnd').addEventListener('change', syncEventTime);

// ═══════════════════════════════════════════════════════════════════════════
// カレンダーイベント登録
// ═══════════════════════════════════════════════════════════════════════════
function pad2(n){ return String(n).padStart(2,'0'); }

function parseTimeRange(timeStr){
  const matches = (timeStr || '').match(/(\d{1,2}):(\d{2})/g) || [];
  if(!matches.length) return null;
  const toParts = (t) => { const [h,m] = t.split(':').map(Number); return {h,m}; };
  return { start: toParts(matches[0]), end: matches[1] ? toParts(matches[1]) : null };
}

function buildCalendarEvent(){
  const dateStr = els.eventDate.value;
  if(!dateStr){ return { error: '開催日を入力してください。' }; }
  const title = els.eventTitle.value.trim() || 'イベント';
  const desc  = els.eventDesc.value.trim();
  const range = parseTimeRange(els.eventTime.value);
  if(!range){
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    const endDateStr = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const ev = { summary: title, start: { date: dateStr }, end: { date: endDateStr } };
    if(desc) ev.description = desc;
    return { event: ev };
  }
  const startDT = `${dateStr}T${pad2(range.start.h)}:${pad2(range.start.m)}:00`;
  const endH    = range.end ? range.end.h : range.start.h + 1;
  const endM    = range.end ? range.end.m : range.start.m;
  const endDT   = `${dateStr}T${pad2(endH)}:${pad2(endM)}:00`;
  const ev = { summary: title, start: { dateTime: startDT, timeZone: 'Asia/Tokyo' }, end: { dateTime: endDT, timeZone: 'Asia/Tokyo' } };
  if(desc) ev.description = desc;
  return { event: ev };
}

els.calAddEventBtn.addEventListener('click', async ()=>{
  els.calAddStatus.classList.remove('error');
  if(!accessToken){
    els.calAddStatus.textContent = '先にGoogleと連携してください。';
    els.calAddStatus.classList.add('error'); return;
  }
  const built = buildCalendarEvent();
  if(built.error){
    els.calAddStatus.textContent = built.error;
    els.calAddStatus.classList.add('error'); return;
  }
  if(!calSettings.calendarId){
    els.calAddStatus.textContent = 'カレンダーIDを設定してください。';
    els.calAddStatus.classList.add('error'); return;
  }
  els.calAddEventBtn.disabled = true;
  els.calAddStatus.textContent = '登録中…';
  try{
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calSettings.calendarId)}/events`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
      body: JSON.stringify(built.event),
    });
    if(!res.ok){ const t = await res.text(); throw new Error('Calendar API error ' + res.status + ' ' + t); }
    els.calAddStatus.textContent = '✅ カレンダーに登録しました。';
    els.eventTitle.value = '';
    els.eventDate.value  = '';
    els.eventDesc.value  = '';
    document.getElementById('eventTimeStart').value = '';
    document.getElementById('eventTimeEnd').value   = '';
    els.eventTime.value  = '';
  }catch(err){
    console.error(err);
    els.calAddStatus.textContent = '登録に失敗しました。連携状態とカレンダーIDを確認してください。';
    els.calAddStatus.classList.add('error');
  }finally{
    els.calAddEventBtn.disabled = false;
  }
});

els.eventClear.addEventListener('click', ()=>{
  els.eventDate.value = '';
  document.getElementById('eventTimeStart').value = '';
  document.getElementById('eventTimeEnd').value   = '';
  els.eventTime.value = '';
});

// ═══════════════════════════════════════════════════════════════════════════
// WEB連携設定
// ═══════════════════════════════════════════════════════════════════════════
function updatePubStatus(){
  const ok = publishSettings.netlifyToken && publishSettings.netlifySiteId;
  els.pubStatusText.textContent = ok ? '設定済み ✓' : '未設定（Netlify Token・Site IDが必要）';
}

async function loadPubSettings(){

// GOOGLE SHEETS API
// ═══════════════════════════════════════════════════════════════════════════
async function sheetsRequest(method, path, body){
  const opts = { method, headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch('https://sheets.googleapis.com/v4'+path, opts);
  if(!res.ok){ const t=await res.text(); throw new Error('Sheets error '+res.status+': '+t.slice(0,200)); }
  return res.json();
}

async function loadPubHistory(){
  const section = document.getElementById('pubHistorySection');
  const listEl  = document.getElementById('pubHistoryList');
  if(!accessToken){ section.style.display='none'; return; }
  section.style.display = 'block';
  if(!publishSettings.sheetsId){
    listEl.innerHTML = '<span style="color:var(--ink-soft)">🌐 Webサイト連携パネルにGoogle SheetsのIDを入力してください。</span>';
    return;
  }
  listEl.textContent = '読み込み中…';
  try{
    const range = encodeURIComponent('Events!A2:C50');
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${publishSettings.sheetsId}/values/${range}`,{
      headers:{ Authorization:'Bearer '+accessToken }
    });
    const data = await res.json();
    const rows = data.values || [];
    if(!rows.length){ listEl.textContent = '（まだ記録がありません）'; return; }
    listEl.innerHTML = rows.reverse().map(r=>{
      const [date, slug, title] = r;
      const url = slug ? `https://zuppa-lab.com/salon/event/${slug}/` : '';
      return `<div style="border-bottom:1px solid var(--line);padding:4px 0;">
        <span style="color:var(--ink-soft)">${date}</span>
        ${url ? `<a href="${url}" target="_blank" style="color:var(--link);margin-left:6px;">${escapeHtml(title||slug)}</a>` : `<span style="margin-left:6px;">${escapeHtml(title)}</span>`}
      </div>`;
    }).join('');
  }catch(e){ listEl.textContent = 'エラー: '+e.message; }
}

function showPreviewOverlay(html){
  const blob = new Blob([html], { type: 'text/html' });

  const tab  = window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 10000);

// ═══════════════════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════════════════
async function sha1hex(buffer){
  const hash = await crypto.subtle.digest('SHA-1', buffer instanceof ArrayBuffer ? buffer : buffer.buffer || buffer);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function fetchSiteCSSUrl(){
  try{
    const ctrl  = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 5000);
    const r     = await fetch('https://zuppa-lab.com/salon/event/', {signal: ctrl.signal});
    clearTimeout(timer);
    const h = await r.text();
    const m = h.match(/href="(\/_astro\/[^"]+\.css)"/);
    return m ? 'https://zuppa-lab.com' + m[1] : null;
  }catch(e){ console.warn('CSS URL fetch failed:', e); return null; }
}

  const range = encodeURIComponent('Events!A2:G');

// ═══════════════════════════════════════════════════════════════════════════
// NETLIFY DEPLOY API
// ═══════════════════════════════════════════════════════════════════════════
async function netlifyFetch(method, path, body, isOctet){
  const headers = { 'Authorization':'Bearer '+publishSettings.netlifyToken };
  if(isOctet) headers['Content-Type']='application/octet-stream';
  else headers['Content-Type']='application/json';
  const opts = { method, headers };
  if(body) opts.body = isOctet ? body : JSON.stringify(body);
  const res = await fetch('https://api.netlify.com/api/v1'+path, opts);
  if(!res.ok){ const t=await res.text(); throw new Error('Netlify '+res.status+': '+t.slice(0,200)); }
  const ct = res.headers.get('content-type')||'';
  return ct.includes('json') ? res.json() : res.text();
}

async function getExistingFiles(){
  const deploys = await netlifyFetch('GET',`/sites/${publishSettings.netlifySiteId}/deploys?state=ready&per_page=1`);
  if(!deploys.length) throw new Error('Netlifyに公開済みデプロイが見つかりません。');
  const files = await netlifyFetch('GET',`/deploys/${deploys[0].id}/files`);
  const manifest = {};
  for(const f of files){
    const p = f.id || f.path || '';
    const normalized = p.startsWith('/') ? p : '/'+p;
    manifest[normalized] = f.sha;
  }
  return manifest;
}

async function netlifyDeploy(filesToDeploy, statusEl){
  const existing = await getExistingFiles();
  const fileManifest = { ...existing };
  const sha1Map = {};
  for(const { path, buffer } of filesToDeploy){
    const buf  = buffer instanceof ArrayBuffer ? buffer : buffer.buffer || buffer;
    const hash = await sha1hex(buf);
    fileManifest[path] = hash;
    sha1Map[hash] = { path, buffer: buf };
  }
  statusEl.textContent = '⏳ デプロイを作成中…';
  const deploy   = await netlifyFetch('POST',`/sites/${publishSettings.netlifySiteId}/deploys`,{ files:fileManifest });
  const deployId = deploy.id;
  const required = deploy.required || [];
  statusEl.textContent = `⏳ ファイルをアップロード中（${required.length}件）…`;
  for(const hash of required){
    const entry = sha1Map[hash];
    if(!entry){ console.warn('hash not found:', hash); continue; }
    await netlifyFetch('PUT',`/deploys/${deployId}/files${entry.path}`, entry.buffer, true);
  }
  statusEl.textContent = '⏳ デプロイ確定中…';
  let ready = false;
  for(let i = 0; i < 20; i++){
    await new Promise(r=>setTimeout(r, 3000));
    const d = await netlifyFetch('GET',`/deploys/${deployId}`);
    if(d.state === 'ready' || d.state === 'uploaded'){ ready = true; break; }
  }
  if(!ready) throw new Error('デプロイのタイムアウト。Netlifyダッシュボードを確認してください。');
}
